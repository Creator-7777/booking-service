spring:

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 10
          fetch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    threads:
      max: 10
      min-spare: 2

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

google:
  apps-script-url: ${GOOGLE_APPS_SCRIPT_URL}
  calendar-id: ${GOOGLE_CALENDAR_ID}
  credentials-json: ${GOOGLE_SERVICE_ACCOUNT_JSON}

sms:
  api-key: ${SMS_API_KEY}
  user: ${SMS_USER}
  password: ${SMS_PASSWORD}
  sender: ${SMS_SENDER}

logging:
  level:
    root: WARN
    com.alena: INFO

