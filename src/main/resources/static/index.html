<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Elena Nail Studio</title>
    <meta name="theme-color" content="#7d4cff">
    <meta name="description"
            content="Online booking for manicure and pedicure">
    <link rel="stylesheet" href="booking.css">
    <link rel="preconnect"
          href="https://fonts.googleapis.com">
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
</head>

<body>
<div class="page">
    <div class="booking-card">

        <!-- ========================= -->
        <!-- Language selector         -->
        <!-- ========================= -->

        <div class="language-selector">
            <button
                    id="languageBtn"
                    class="language-btn"
                    type="button">
                🌍
            </button>
            <div id="languageMenu"
                 class="language-menu hidden">
                <button data-lang="ru">RU Русский </button>
                <button data-lang="en">GB English</button>
                <button data-lang="he">IL עברית</button>
            </div>
        </div>

        <button
                id="cabinetBtn"
                class="cabinet-btn">
            👤
        </button>

        <!-- ========================= -->
        <!-- Logo                      -->
        <!-- ========================= -->

        <div class="logo-wrapper">
            <img
                    class="logo"
                    src="https://i.imgur.com/SGjW8gC.jpeg"
                    alt="Elena Nail Studio">
        </div>

        <!-- ========================= -->
        <!-- Instagram                 -->
        <!-- ========================= -->

        <div class="socials">
            <a href="https://www.instagram.com/elenanail.rlz?igsh=MTdxcTYza3BtYXRseg=="
               target="_blank">
                <img
                        src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
                        alt="Instagram">
            </a>
        </div>

        <!-- ========================= -->
        <!-- Header                    -->
        <!-- ========================= -->

        <h1>Elena Nail Studio</h1>
        <p class="subtitle" data-i18n="subtitle"> Онлайн запись </p>

        <!-- ========================= -->
        <!-- Booking Form              -->
        <!-- ========================= -->

        <form id="form">
            <!-- Name -->
            <div class="field">
                <label
                        for="name"
                        data-i18n="name">
                    Name
                </label>
                <input
                        id="name"
                        name="name"
                        type="text"
                        required
                        data-i18n-placeholder="namePlaceholder"
                        placeholder="Your name">
            </div>
            <!-- Phone -->
            <div class="field">
                <label
                        for="phone"
                        data-i18n="phone">
                    Phone
                </label>

                <input
                        id="phone"
                        name="phone"
                        type="tel"
                        required
                        pattern="^05\d\d{7}$"
                        placeholder="05XXXXXXXX"
                        data-i18n-placeholder="phonePlaceholder">
                <span
                        id="phone-error"
                        class="error-message"
                        style="display:none"
                        data-i18n="phoneInvalid">
                    Invalid phone number
                </span>
            </div>

            <!-- Send SMS -->
            <button
                    id="sendCodeBtn"
                    type="button"
                    class="secondary"
                    data-i18n="sendCode">
                Send SMS Code
            </button>
            <!-- Verification -->
            <div
                    id="codeSection"
                    class="hidden">
                <label
                        for="codeInput"
                        data-i18n="verifyCode">
                    Verification Code
                </label>
                <input
                        id="codeInput"
                        type="text"
                        autocomplete="one-time-code"
                        data-i18n-placeholder="verifyCodePlaceholder"
                        placeholder="Enter SMS Code">
            </div>

            <!-- ========================= -->
            <!-- Services                  -->
            <!-- ========================= -->

            <div class="field">
                <label
                        for="service"
                        data-i18n="service">
                    Services
                </label>

                <select
                        id="service"
                        name="service"
                        multiple
                        required>
                </select>

            </div>

            <!-- ========================= -->
            <!-- Date                      -->
            <!-- ========================= -->

            <div class="field">
                <label
                        for="date"
                        data-i18n="date">
                    Date
                </label>

                <input
                        id="date"
                        name="date"
                        type="date"
                        required>

            </div>

            <!-- ========================= -->
            <!-- Time                      -->
            <!-- ========================= -->

            <div class="field">
                <label
                        for="time"
                        data-i18n="time">
                    Time
                </label>

                <select
                        id="time"
                        name="time"
                        required>
                    <option value=""
                            data-i18n="chooseTime">
                        Choose time
                    </option>
                </select>
            </div>

            <!-- ========================= -->
            <!-- Submit                    -->
            <!-- ========================= -->

            <button
                    id="submitBtn"
                    class="primary"
                    type="submit"
                    data-i18n="submit">
                Book Now
            </button>
        </form>

        <!-- ========================= -->
        <!-- Status                    -->
        <!-- ========================= -->

        <div id="status" class="status"> </div>

        <!-- ========================= -->
        <!-- Cabinet                   -->
        <!-- ========================= -->

        <div id="cabinetWindow" class="cabinet hidden">
            <div class="cabinet-header">
                <h2 data-i18n="myCabinet">
                    Мои записи
                </h2>
                <button
                        id="closeCabinet"
                        type="button">
                    ✕
                </button>
            </div>
            <div id="cabinetContent">
            </div>
        </div>

        <!-- ========================= -->
        <!-- No slots                  -->
        <!-- ========================= -->

        <div
                id="no-slots"
                class="warning hidden"
                data-i18n="noSlots">
            No available time slots
        </div>

    </div>

    <footer>
        <p>
            © 2026 Elena Nail Studio
        </p>
    </footer>
</div>

<!--<script src="js/script.js"></script>-->

<!--the order is important-->
<script src="js/utils.js"></script>
<script src="js/language.js"></script>
<script src="js/calendar.js"></script>
<script src="js/sms.js"></script>
<script src="js/booking.js"></script>
<script src="js/app.js"></script>

</body>
</html>
