<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="booking.css">
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Elena Nail Studio</title>
    <meta name="theme-color" content="#7d4cff">
    <meta
            name="description"
            content="Онлайн запись на маникюр и педикюр">
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">
</head>
<body>
<div class="page">
    <div class="booking-card">
        <!-- Language selector -->
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
            <select id="language">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="he">עברית</option>
            </select>
        </div>

        <div class="logo-wrapper">
            <img class="logo"
                 src="https://i.imgur.com/SGjW8gC.jpeg"
                 alt="Elena Nail Studio">
        </div>

        <div class="socials">
            <a href="https://www.instagram.com/elenanail.rlz?igsh=MTdxcTYza3BtYXRseg=="target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
            </a>
        </div>

        <h1> Elena Nail Studio </h1>
       <!-- <p class="subtitle" data-i18n="subtitle"> Онлайн запись </p>-->
        <p  data-i18n="subtitle"> Онлайн запись </p>

        <form id="form">
            <div class="field">
                <label data-i18n="name">Имя</label>
                <input name="name"
                       id="name"
                       placeholder="Ваше имя" required>
            </div>

            <div class="field">
                <label data-i18n="phone">Телефон</label>

                <input name="phone"
                       id="phone"
                       placeholder="05XXXXXXXX"
                       pattern="^05\d\d{7}$" required>

                <span id="phone-error"
                      style="color:red; display:none;"
                      data-i18n="phoneInvalid">❌ Номер должен быть в формате 05XXXXXXXX
                </span>

            </div>

            <button type="button"
                    id="sendCodeBtn"
                    class="secondary"
                    data-i18n="sendCode">Получить SMS-код
            </button>

            <div id="codeSection"
                 class="hidden">
                <label data-i18n="verifyCode">Код подтверждения</label>
                <input id="codeInput"
                       type="text"
                       placeholder="Введите код из SMS">
            </div>

            <div class="field">
                <label for="service"
                       data-i18n="service">
                    Услуги
                </label>

                <select
                        id="service"
                        name="service"
                        multiple
                        required>

                    <option value="Маникюр — 120₪">Маникюр — 120₪</option>

                    <option value="Маникюр+укреп — 200₪">
                        Маникюр + укрепление — 200₪
                    </option>

                    <option value="Наращивание — 350₪">
                        Наращивание — 350₪
                    </option>

                    <option value="Ремонт ногтя — 10₪">
                        Ремонт ногтя — 10₪
                    </option>

                    <option value="Доращивание — 20₪">
                        Доращивание — 20₪
                    </option>

                    <option value="Фрэнч — 30₪">
                        Фрэнч — 30₪
                    </option>

                    <option value="Простой дизайн — 10₪">
                        Простой дизайн — 10₪
                    </option>

                    <option value="Сложный дизайн — 30₪">
                        Сложный дизайн — 30₪
                    </option>

                    <option value="Царь ноготь — 50₪">
                        Царь ноготь — 50₪
                    </option>

                    <option value="Зачистка — 40₪">
                        Зачистка — 40₪
                    </option>

                    <option value="Педикюр гиг. пальцы — 160₪">
                        Педикюр пальцы — 160₪
                    </option>

                    <option value="Педикюр+гельлак — 220₪">
                        Педикюр + гельлак — 220₪
                    </option>

                    <option value="Педикюр обычный — 200₪">
                        Педикюр обычный — 200₪
                    </option>

                    <option value="Удаление мозолей — 50₪">
                        Удаление мозолей — 50₪
                    </option>

                    <option value="Работа с трещинами — 50₪">
                        Работа с трещинами — 50₪
                    </option>

                    <option value="Удаление вросшего ногтя — 50₪">
                        Удаление вросшего ногтя — 50₪
                    </option>

                    <option value="Тампонада жидкая — 50₪">
                        Тампонада жидкая — 50₪
                    </option>

                </select>

            </div>

            <div class="field">
                <label for="date"
                       data-i18n="date">
                    Дата
                </label>

                <input id="date"
                       name="date"
                       type="date" required>
            </div>

            <div class="field">
                <label for="time"
                       data-i18n="time">
                    Время
                </label>

                <select id="time" name="time" required>
                    <option value=""
                            data-i18n="chooseTime">
                        Выберите время
                    </option>
                </select>
            </div>

            <button
                    id="submitBtn"
                    class="primary"
                    type="submit"
                    data-i18n="submit">Записаться
            </button>

        </form>
        <div id="status"
             class="status">

        </div>
        <div id="no-slots"
             class="warning hidden"
             data-i18n="noSlots">😢 На выбранную дату нет свободного времени
        </div>

    </div>
    <footer>
        <p> © 2026 Elena Nail Studio</p>
    </footer>
</div>
<script src="js/script.js"></script>
</body>
</html>
